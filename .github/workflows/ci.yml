name: Zynex CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install the correct version of Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install your dependencies (like Vitest)
      - name: Install Dependencies
        run: npm ci

      # 4. Run the test suite!
      - name: Run Vitest
        run: npm run test