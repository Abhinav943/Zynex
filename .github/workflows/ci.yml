name: Zynex CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

      - name: Enforce Prettier Formatting
        run: npm run format:check

      - name: Run Vitest Coverage
        run: npm run test:coverage
